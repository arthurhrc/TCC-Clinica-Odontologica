<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/css/login.css">
    <title>OdontoClinic — Login</title>
</head>
<body class="login-page">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-brand-icon">🦷</div>
                <h1>OdontoClinic</h1>
                <p>Sistema de Gestão Odontológica</p>
            </div>

            <form id="loginForm">
                <div class="field-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" placeholder="Digite seu usuário" required>
                </div>
                <div class="field-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
                <p id="errorMessage"></p>
            </form>

            <div class="demo-section">
                <span class="demo-label">Acesso rápido para demonstração</span>
                <div class="demo-buttons">
                    <button class="demo-btn" onclick="fillCredentials('pedro.souza', 'senha123')">
                        <span class="demo-btn-role">Colaborador</span>
                        <span class="demo-btn-info">pedro.souza</span>
                    </button>
                    <button class="demo-btn" onclick="fillCredentials('ricardo.almeida', 'senha789')">
                        <span class="demo-btn-role">Gerente</span>
                        <span class="demo-btn-info">ricardo.almeida</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="src/js/config.js"></script>
    <script src="src/js/script.js"></script>
    <script>
        function fillCredentials(user, pass) {
            document.getElementById('username').value = user;
            document.getElementById('password').value = pass;
            document.getElementById('loginForm').requestSubmit();
        }
    </script>
</body>
</html>
