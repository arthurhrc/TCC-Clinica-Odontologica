<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/styles.css">
    <title>Login</title>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="submit-btn">Entrar</button>
            </form>

            <p id="errorMessage" style="color:red; margin-top: 10px;"></p>

        </div>

        <div class="demo-card">
            <p class="demo-title">🔑 Acesso demo</p>
            <div class="demo-users">
                <button class="demo-user" onclick="fillCredentials('pedro.souza', 'senha123')">
                    <span class="demo-role">Colaborador</span>
                    <span class="demo-creds">pedro.souza / senha123</span>
                </button>
                <button class="demo-user" onclick="fillCredentials('ricardo.almeida', 'senha789')">
                    <span class="demo-role">Gerente</span>
                    <span class="demo-creds">ricardo.almeida / senha789</span>
                </button>
            </div>
        </div>
    </div>
    <script src="src/js/script.js"></script>
    <script>
        function fillCredentials(user, pass) {
            document.getElementById('username').value = user;
            document.getElementById('password').value = pass;
            document.getElementById('loginForm').requestSubmit();
        }
    </script>
</body>
</html>
