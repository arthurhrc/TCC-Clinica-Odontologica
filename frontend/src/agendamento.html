<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <title>Agendamento</title>
</head>
<body>
    <div class="container">
        <h1>Agendar</h1>
        <form id="agendamento">
            <div class="row">
                <div class="col-md-6">
                    <label for="dataConsulta">Data da Consulta</label>
                    <input type="date" id="dataConsulta" onchange="loadAvailableData()">

                    <label for="tipoConsulta">Tipo de Consulta</label>
                    <select id="tipoConsulta" onchange="loadAvailableData()">
                        <option value="normal" selected>Normal</option>
                        <option value="cirurgia">Cirurgia</option>
                    </select>

                    <label for="horarioList">Horários Disponíveis</label>
                    <select id="horarioList" onchange="loadAvailableProfessionals()">
                        <!-- Horários disponíveis serão populados aqui -->
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="professionalList">Profissionais Disponíveis</label>
                    <select id="professionalList">
                        <!-- Profissionais disponíveis serão populados aqui -->
                    </select>

                    <label for="nomePaciente">Nome do Paciente</label>
                    <div class="input-group">
                        <p id="idPaciente"></p>
                        <input type="text" id="nomePaciente" name="nomePaciente" readonly required>
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#pacienteModal">Buscar Paciente</button>
                    </div>                   

                    <div class="modal fade" id="pacienteModal" tabindex="-1" aria-labelledby="pacienteModalLabel" aria-hidden="true">
                        <div class="modal-dialog modal-lg">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title" id="pacienteModalLabel">Buscar Paciente</h5>
                                    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#pacienteModal">Buscar Paciente</button>
                                </div>
                                <div class="modal-body">
                                    <input type="text" id="searchPaciente" oninput="filterPacientes()" placeholder="Buscar por nome..." class="form-control">
                                    <ul id="pacienteList" class="list-group mt-2"></ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    <label for="valorConsulta">Valor da Consulta</label>
                    <div class="input-group">
                        <input type="text" id="valorConsulta" name="valorConsulta" required>
                    </div>
                </div>
            </div>
            <button type="submit" class="submit-btn mt-4">Agendar</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
