<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <title>Serviços e Lançamentos</title>
</head>
<body>
    <div class="container">
        <h1>Cadastrar Serviços e Lançamentos</h1>
        <form id="cadastroFormServicos">
            <div class="row">
                <div class="col">
                    <label for="id">ID</label>
                    <input type="text" id="id" name="id" readonly>

                    <label for="nomeCompleto">Nome Completo</label>
                    <input type="text" id="nomeCompleto" name="nomeCompleto" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="Email" required>

                    <label for="phone">Telefone</label>
                    <input type="tel" id="phone" name="Telefone" required> 

                    <label for="dataNascimento">Data de Nascimento</label>
                    <input type="date" id="dataNascimento" name="dataNascimento" required>

                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" required> 
                </div>
                <div class="col">
                    <label for="dataCadastro">Data de Cadastro</label>
                    <input type="date" id="dataCadastro" name="dataCadastro" readonly>

                    <label for="rg">RG</label>
                    <input type="text" id="rg" name="rg">

                    <label for="estadoCivil">Estado Civil</label>
                    <select id="estadoCivil" name="estadoCivil">
                        <option value="0">Solteiro(a)</option>
                        <option value="1">Casado(a)</option>
                        <option value="2">Divorciado(a)</option>
                        <option value="3">Viúvo(a)</option>
                    </select>

                    <label for="sexo">Sexo</label>
                    <select id="sexo" name="sexo">
                        <option value="0">Masculino</option>
                        <option value="1">Feminino</option>
                        <option value="2">Outro</option>

                    </select>

                    <label for="dentistaResponsavel">Dentista Responsável</label>
                    <select id="dentistaResponsavel" name="dentistaResponsavel">
                        <option value="">Selecione</option>
                    </select>

                    <label for="imagem">Upload de Imagem</label>
                    <input type="file" id="imagem" name="imagem" accept="image/*">
                </div>
            </div>

            <h2>Endereço</h2>

            <div class="row">
                <div class="col">
                    <label for="pais">País</label>
                    <input type="text" id="pais" name="pais" required>

                    <label for="estado">Estado</label>
                    <input type="text" id="estado" name="estado" required>

                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" name="cidade" required>

                    <label for="cep">CEP</label>
                    <input type="text" id="cep" name="cep" required> 
                </div>
                <div class="col">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" name="bairro" required>

                    <label for="rua">Rua</label>
                    <input type="text" id="rua" name="rua" required> 

                    <label for="numero">Número</label>
                    <input type="text" id="numero" name="numero" required>

                    <label for="complemento">Complemento</label>
                    <input type="text" id="complemento" name="complemento" required>                           
                </div>
            </div>
            <button type="submit" class="submit-btn">Cadastrar</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/script.js"></script>
</body>
  
</html>
