<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <title>Agenda de Consultas</title>
</head>
<body>
    <div class="container mt-5">
        <h1>Agenda de Consultas</h1>
        <!-- Abas -->
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="consultas-tab" data-bs-toggle="tab" data-bs-target="#consultas" type="button" role="tab" aria-controls="consultas" aria-selected="true">Consultas</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="cirurgias-tab" data-bs-toggle="tab" data-bs-target="#cirurgias" type="button" role="tab" aria-controls="cirurgias" aria-selected="false" onclick="loadSurgeonAgenda()">Cirurgias</button>
            </li>
        </ul>
        <div class="tab-content" id="myTabContent">
            <!-- Conteúdo da aba de Consultas Normais -->
            <div class="tab-pane fade show active" id="consultas" role="tabpanel" aria-labelledby="consultas-tab">
                <table class="table table-striped mt-3">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Horário</th>
                            <th>Cliente</th>
                            <th>Profissional</th>
                            <th>Valor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="consultasTable">
                        <!-- Conteúdo dinâmico das consultas normais -->
                    </tbody>
                </table>
            </div>
            <!-- Conteúdo da aba de Cirurgias -->
            <div class="tab-pane fade" id="cirurgias" role="tabpanel" aria-labelledby="cirurgias-tab">
                <table class="table table-striped mt-3">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Horário</th>
                            <th>Cliente</th>
                            <th>Profissional</th>
                            <th>Valor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="cirurgiasTable">
                        <!-- Conteúdo dinâmico das cirurgias -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal para Visualizar Detalhes da Consulta -->
    <div class="modal fade" id="viewModal" tabindex="-1" aria-labelledby="viewModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="viewModalLabel">Detalhes da Consulta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="consultaDetalhes">
                        <!-- Detalhes da consulta serão carregados aqui -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Edição -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Editar Consulta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="updateFormConsultation">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="id" class="form-label">Id</label>
                                <input type="text" id="id" name="id" class="form-control" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="tipoConsulta" class="form-label">Tipo de Consulta</label>
                                <input type="text" id="tipoConsulta" name="tipoConsulta" class="form-control" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="dataConsulta" class="form-label">Data da Consulta</label>
                                <input type="date" id="dataConsulta" name="dataConsulta" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="horarioList" class="form-label">Hora</label>
                                <select id="horarioList" name="horarioList" class="form-select" required>
                                    <option value="" >Selecione um horário</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="client" class="form-label">Cliente</label>
                                <input type="text" id="client" name="client" class="form-control" readonly>
                                <p id="clientId"></p>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="professional" class="form-label">Profissional</label>
                                <input type="text" id="professional" name="professional" class="form-control" readonly>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="value" class="form-label">Valor</label>
                                <input type="number" id="value" name="value" class="form-control" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                    </form>
                </div>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
