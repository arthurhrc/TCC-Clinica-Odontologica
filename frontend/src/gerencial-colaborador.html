<body>
    <div class="container">
        <h1>Lista de Colaboradores</h1>

        <div id="editar" class="tab-content">
            <div>
                <table id="listaColaboradoresEditar" class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Telefone</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Conteúdo gerado dinamicamente via JS -->
                    </tbody>
                </table>
            </div>          
        </div>     
    </div>

    <!-- Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editModalLabel">Editar Colaborador</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="updateFormColaborador">
            <div class="row">
                <div class="col">
                    <label for="id">ID</label>
                    <input type="text" id="id" name="id" readonly>

                    <label for="nomeCompleto">Nome Completo</label>
                    <input type="text" id="nomeCompleto" name="nomeCompleto" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="Email" required>

                    <label for="phone">Telefone</label>
                    <input type="tel" id="phone" name="Telefone" required> 

                    <label for="dataNascimento">Data de Nascimento</label>
                    <input type="date" id="dataNascimento" name="dataNascimento" required>

                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" required> 
                </div>
                <div class="col">
                    <label for="dataCadastro">Data de Cadastro</label>
                    <input type="date" id="dataCadastro" name="dataCadastro" readonly>

                    <label for="rg">RG</label>
                    <input type="text" id="rg" name="rg">

                    <label for="sexo">Sexo</label>
                    <select id="sexo" name="sexo">
                        <option value="0">Masculino</option>
                        <option value="1">Feminino</option>
                        <option value="2">Outro</option>
                    </select>

                    <label for="username">Nome de Usuário</label>
                    <input type="text" id="username" name="username">

                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha">

                    <label for="confirmarSenha">Confirmar Senha</label>
                    <input type="password" id="confirmarSenha" name="confirmarSenha" required> 

                </div>
            </div>

            <h2>Endereço</h2>

            <div class="row">
                <div class="col">
                    <label for="pais">País</label>
                    <input type="text" id="pais" name="pais" required>

                    <label for="estado">Estado</label>
                    <input type="text" id="estado" name="estado" required>

                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" name="cidade" required>

                    <label for="cep">CEP</label>
                    <input type="text" id="cep" name="cep" required> 
                </div>
                <div class="col">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" name="bairro" required>

                    <label for="rua">Rua</label>
                    <input type="text" id="rua" name="rua" required> 

                    <label for="numero">Número</label>
                    <input type="text" id="numero" name="numero" required>

                    <label for="complemento">Complemento</label>
                    <input type="text" id="complemento" name="complemento" required>                           
                </div>
            </div>
            <button type="submit" class="submit-btn">Salvar Alterações</button>
          </form>
      </div>
    </div>
  </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
